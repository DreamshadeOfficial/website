<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Walk2Eat — Scegli versione</title>
  <link rel="icon" href="../walk2eat-v2/assets/branding-hq/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --bg-soft: #111827;
      --card: #1e293b;
      --card-border: #334155;
      --text: #e5e7eb;
      --text-secondary: #94a3b8;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --accent-soft: rgba(34,197,94,0.12);
      --radius: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .logo {
      width: 96px;
      height: 96px;
      margin-bottom: 16px;
      filter: drop-shadow(0 4px 12px rgba(34,197,94,0.3));
    }

    .brand-text {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .brand-two {
      color: var(--accent);
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 40px;
    }

    .selector {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 380px;
    }

    .selector a {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 20px 24px;
      text-decoration: none;
      color: var(--text);
      transition: all 0.2s ease;
      box-shadow: var(--shadow);
      min-height: 80px;
    }

    .selector a:hover,
    .selector a:active {
      border-color: var(--accent);
      background: var(--accent-soft);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(34,197,94,0.15);
    }

    .selector .icon {
      font-size: 2rem;
      flex-shrink: 0;
      width: 48px;
      text-align: center;
    }

    .selector .label {
      flex: 1;
    }

    .selector .label .name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .selector .label .desc {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .selector .arrow {
      color: var(--text-secondary);
      font-size: 1.2rem;
      transition: transform 0.2s ease;
    }

    .selector a:hover .arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    .footer {
      margin-top: 48px;
      color: var(--text-secondary);
      font-size: 0.75rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <img class="logo" src="../walk2eat-v2/assets/branding-hq/walk2eat-symbol-128.png" alt="Walk2Eat">

  <div class="brand-text">Walk<span class="brand-two">2</span>Eat</div>
  <p class="subtitle">Scegli la versione dell'app</p>

  <div class="selector">
    <a href="../pausaloop-v2/">
      <span class="icon">🍽️</span>
      <div class="label">
        <div class="name">Walk2Eat v1</div>
        <div class="desc">Versione stabile</div>
      </div>
      <span class="arrow">›</span>
    </a>

    <a href="../walk2eat-v2/">
      <span class="icon">✨</span>
      <div class="label">
        <div class="name">Walk2Eat v2</div>
        <div class="desc">Nuovo design e funzionalità</div>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>

  <p class="footer">dreamshade.ch</p>
</body>
</html>
