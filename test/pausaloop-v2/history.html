<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Cronologia</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'>PausaLoop</div><div class='nav-links'><a class='btn secondary' href='dashboard.html'>Dashboard</a><a class='btn ghost' href='favorites.html'>Preferiti</a></div></div><div class='card'><h3>Cronologia pause</h3><div id='hist' class='list'></div></div></div><script src='assets/js/app.js'></script><script>const hist=LBW.Store.get('lbw_history',[]);const histEl=document.getElementById('hist');if(!hist.length){histEl.innerHTML='<div class="small">Nessuna pausa registrata</div>';}else{histEl.innerHTML=hist.map((x,i)=>{const pFav=LBW.isFavoritePlace(x.food)?'★':'☆';const rFav=LBW.isFavoriteRoute(x)?'★':'☆';return `<div class='card'><b>${x.food.name}</b><div class='small'>${new Date(x.createdAt).toLocaleString()}</div><div class='small'>Percorso: ${x.walk.minutes} min • ${x.walk.distanceKm} km • ${x.walk.type}</div><div class='small'>Ristorante/spot: ${x.food.cuisine} • ${x.food.price} • ⭐ ${x.food.rating}</div><div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'><button class='btn ghost' id='starPlace${i}'>${pFav} Ristorante</button><button class='btn ghost' id='starRoute${i}'>${rFav} Percorso</button></div></div>`;}).join('');setTimeout(()=>{hist.forEach((x,i)=>{const bp=document.getElementById(`starPlace${i}`),br=document.getElementById(`starRoute${i}`);if(bp)bp.onclick=()=>{const on=LBW.toggleFavoritePlace(x.food);bp.textContent=`${on?'★':'☆'} Ristorante`;};if(br)br.onclick=()=>{const on=LBW.toggleFavoriteRoute(x);br.textContent=`${on?'★':'☆'} Percorso`;};});},0);}</script></body></html>
