<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Cronologia</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'>PausaLoop</div><div class='nav-links'><a class='btn secondary' href='dashboard.html'>La tua pausa</a><a class='btn ghost' href='favorites.html'>Preferiti</a></div></div><div class='card'><h3>Cronologia pause</h3><div id='hist' class='list'></div></div></div><script src='assets/js/app.js'></script><script>const HEART_OFF='\u2661',HEART_ON='\u2764';const hist=LBW.Store.get('lbw_history',[]);const histEl=document.getElementById('hist');if(!hist.length){histEl.innerHTML='<div class="small">Nessuna pausa registrata</div>';}else{histEl.innerHTML=hist.map((x,i)=>{const pFav=LBW.isFavoritePlace(x.food)?HEART_ON:HEART_OFF;const rFav=LBW.isFavoriteRoute(x)?HEART_ON:HEART_OFF;const foodInfo=[x.food.cuisine];if(x.food.price&&x.food.price!=='-') foodInfo.push(x.food.price);return `<div class='card'><b>${x.food.name}</b><div class='small'>${new Date(x.createdAt).toLocaleString()}</div><div class='small'>Percorso: ${x.walk.minutes} min • ${x.walk.distanceKm} km • ${x.walk.type}</div><div class='small'>Ristorante/spot: ${foodInfo.join(' • ')}</div><div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'><button class='btn ghost' id='favPlace${i}'>${pFav} Ristorante</button><button class='btn ghost' id='favRoute${i}'>${rFav} Percorso</button></div></div>`;}).join('');setTimeout(()=>{hist.forEach((x,i)=>{const bp=document.getElementById(`favPlace${i}`),br=document.getElementById(`favRoute${i}`);if(bp)bp.onclick=()=>{const on=LBW.toggleFavoritePlace(x.food);bp.textContent=`${on?HEART_ON:HEART_OFF} Ristorante`;};if(br)br.onclick=()=>{const on=LBW.toggleFavoriteRoute(x);br.textContent=`${on?HEART_ON:HEART_OFF} Percorso`;};});},0);}</script></body></html>
