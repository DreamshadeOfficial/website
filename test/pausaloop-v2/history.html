<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Cronologia / Salvati</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'>PausaLoop</div><div class='nav-links'><a class='btn secondary' href='dashboard.html'>Dashboard</a></div></div><div class='grid cols-2'><div class='card'><h3>Preferiti • Posti</h3><div id='favPlaces' class='list'></div><h3 style='margin-top:12px'>Preferiti • Percorsi</h3><div id='favRoutes' class='list'></div></div><div class='card'><h3>Cronologia pause</h3><div id='hist' class='list'></div></div></div></div><script src='assets/js/app.js'></script><script>const favPlaces=LBW.Store.get('lbw_fav_places',[]),favRoutes=LBW.Store.get('lbw_fav_routes',[]),hist=LBW.Store.get('lbw_history',[]);document.getElementById('favPlaces').innerHTML=favPlaces.length?favPlaces.map(x=>`<div class='card'><b>${x.name}</b><div class='small'>${x.cuisine} • ${x.price} • ⭐ ${x.rating}</div></div>`).join(''):'<div class="small">Nessun posto preferito</div>';document.getElementById('favRoutes').innerHTML=favRoutes.length?favRoutes.map(x=>`<div class='card'><b>${x.destination}</b><div class='small'>${x.walk.minutes} min • ${x.walk.distanceKm} km</div></div>`).join(''):'<div class="small">Nessun percorso preferito</div>';document.getElementById('hist').innerHTML=hist.length?hist.map((x,i)=>`<div class='card'><b>${x.food.name}</b><div class='small'>${new Date(x.createdAt).toLocaleString()} • ${x.walk.minutes} min</div><div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'><button class='btn ghost' id='saveHP${i}'>Salva posto</button><button class='btn ghost' id='saveHR${i}'>Salva percorso</button></div></div>`).join(''):'<div class="small">Nessuna pausa registrata</div>';setTimeout(()=>{hist.forEach((x,i)=>{const bp=document.getElementById(`saveHP${i}`),br=document.getElementById(`saveHR${i}`);if(bp)bp.onclick=()=>{LBW.saveFavoritePlace(x.food);alert('Posto salvato dai passati');};if(br)br.onclick=()=>{LBW.saveFavoriteRoute(x);alert('Percorso salvato dalla cronologia');};});},0);</script></body></html>
