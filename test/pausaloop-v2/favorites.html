<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Preferiti</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'>PausaLoop</div><div class='nav-links'><a class='btn secondary' href='dashboard.html'>Dashboard</a><a class='btn ghost' href='history.html'>Cronologia</a></div></div><div class='card'><h3>Preferiti</h3><div id='favList' class='list'></div></div></div><script src='assets/js/app.js'></script><script>const fp=LBW.Store.get('lbw_fav_places',[]),fr=LBW.Store.get('lbw_fav_routes',[]);const list=document.getElementById('favList');const placeHtml=fp.map((x,i)=>`<div class='card'><b>${x.name}</b><div class='small'>Tipo: Ristorante/spot • ${x.cuisine} • ${x.price} • ⭐ ${x.rating}</div><div class='small'>Salvato: ${new Date(x.savedAt||Date.now()).toLocaleString()}</div><div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'><button class='btn ghost' id='rmP${i}'>★ Rimuovi ristorante</button></div></div>`);const routeHtml=fr.map((x,i)=>`<div class='card'><b>${x.destination}</b><div class='small'>Tipo: Percorso • ${x.walk.minutes} min • ${x.walk.distanceKm} km • ${x.walk.type}</div><div class='small'>Salvato: ${new Date(x.savedAt||Date.now()).toLocaleString()}</div><div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'><button class='btn ghost' id='rmR${i}'>★ Rimuovi percorso</button></div></div>`);const all=[...placeHtml,...routeHtml];list.innerHTML=all.length?all.join(''):'<div class="small">Nessun preferito</div>';setTimeout(()=>{fp.forEach((x,i)=>{const b=document.getElementById(`rmP${i}`);if(b)b.onclick=()=>{LBW.removeFavoritePlace(x);location.reload();};});fr.forEach((x,i)=>{const b=document.getElementById(`rmR${i}`);if(b)b.onclick=()=>{LBW.removeFavoriteRoute({food:{id:String(x.routeId).split('-')[0]},walk:x.walk});location.reload();};});},0);</script></body></html>
