<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Preferiti</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'>PausaLoop</div><div class='nav-links'><a class='btn secondary' href='dashboard.html'>La tua pausa</a><a class='btn ghost' href='history.html'>Cronologia</a></div></div><div class='card'><h3>Preferiti</h3><div style='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px'><button id='viewAll' class='btn secondary'>Lista completa (Percorsi + Ristoranti)</button><button id='viewRestaurants' class='btn ghost'>Solo ristoranti</button></div><div id='favList' class='list'></div></div></div><script src='assets/js/app.js'></script><script>const HEART_ON='\u2764';const fp=LBW.Store.get('lbw_fav_places',[]),fr=LBW.Store.get('lbw_fav_routes',[]);const list=document.getElementById('favList'),btnAll=document.getElementById('viewAll'),btnRest=document.getElementById('viewRestaurants');function renderAll(){const placeHtml=fp.map((x,i)=>`<div class='card'><b>${x.name}</b><div class='small'>Tipo: Ristorante/spot • ${x.cuisine} • ${x.price} • Rating ${x.rating}</div><div class='small'>Salvato: ${new Date(x.savedAt||Date.now()).toLocaleString()}</div><div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'><button class='btn ghost' id='rmP${i}'>${HEART_ON} Rimuovi ristorante</button></div></div>`);const routeHtml=fr.map((x,i)=>`<div class='card'><b>${x.destination}</b><div class='small'>Tipo: Percorso • ${x.walk.minutes} min • ${x.walk.distanceKm} km • ${x.walk.type}</div><div class='small'>Salvato: ${new Date(x.savedAt||Date.now()).toLocaleString()}</div><div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'><button class='btn ghost' id='rmR${i}'>${HEART_ON} Rimuovi percorso</button></div></div>`);const all=[...placeHtml,...routeHtml];list.innerHTML=all.length?all.join(''):'<div class="small">Nessun preferito</div>';setTimeout(()=>{fp.forEach((x,i)=>{const b=document.getElementById(`rmP${i}`);if(b)b.onclick=()=>{LBW.removeFavoritePlace(x);location.reload();};});fr.forEach((x,i)=>{const b=document.getElementById(`rmR${i}`);if(b)b.onclick=()=>{LBW.removeFavoriteRoute({food:{id:String(x.routeId).split('-')[0]},walk:x.walk});location.reload();};});},0);}function renderRestaurants(){list.innerHTML=fp.length?fp.map((x,i)=>`<div class='card'><b>${x.name}</b><div class='small'>${x.cuisine} • ${x.price} • Rating ${x.rating}</div><div class='small'>Salvato: ${new Date(x.savedAt||Date.now()).toLocaleString()}</div><div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'><button class='btn ghost' id='rmOnlyP${i}'>${HEART_ON} Rimuovi ristorante</button></div></div>`).join(''):'<div class="small">Nessun ristorante preferito</div>';setTimeout(()=>{fp.forEach((x,i)=>{const b=document.getElementById(`rmOnlyP${i}`);if(b)b.onclick=()=>{LBW.removeFavoritePlace(x);location.reload();};});},0);}btnAll.onclick=()=>{btnAll.className='btn secondary';btnRest.className='btn ghost';renderAll();};btnRest.onclick=()=>{btnRest.className='btn secondary';btnAll.className='btn ghost';renderRestaurants();};renderAll();</script></body></html>
