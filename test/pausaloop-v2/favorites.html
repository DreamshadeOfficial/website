<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Preferiti</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'>PausaLoop</div><div class='nav-links'><a class='btn secondary' href='dashboard.html'>Dashboard</a><a class='btn ghost' href='history.html'>Cronologia</a></div></div><div class='grid cols-2'><div class='card'><h3>Preferiti • Ristoranti/spot</h3><div id='favPlaces' class='list'></div></div><div class='card'><h3>Preferiti • Percorsi</h3><div id='favRoutes' class='list'></div></div></div></div><script src='assets/js/app.js'></script><script>const fp=LBW.Store.get('lbw_fav_places',[]),fr=LBW.Store.get('lbw_fav_routes',[]);const pEl=document.getElementById('favPlaces'),rEl=document.getElementById('favRoutes');pEl.innerHTML=fp.length?fp.map((x,i)=>`<div class='card'><b>${x.name}</b><div class='small'>${x.cuisine} • ${x.price} • ⭐ ${x.rating}</div><button class='btn ghost' id='rmP${i}'>★ Rimuovi</button></div>`).join(''):'<div class="small">Nessun preferito</div>';rEl.innerHTML=fr.length?fr.map((x,i)=>`<div class='card'><b>${x.destination}</b><div class='small'>${x.walk.minutes} min • ${x.walk.distanceKm} km • ${x.walk.type}</div><button class='btn ghost' id='rmR${i}'>★ Rimuovi</button></div>`).join(''):'<div class="small">Nessun percorso preferito</div>';setTimeout(()=>{fp.forEach((x,i)=>{const b=document.getElementById(`rmP${i}`);if(b)b.onclick=()=>{LBW.removeFavoritePlace(x);location.reload();};});fr.forEach((x,i)=>{const b=document.getElementById(`rmR${i}`);if(b)b.onclick=()=>{LBW.removeFavoriteRoute({food:{id:String(x.routeId).split('-')[0]},walk:x.walk});location.reload();};});},0);</script></body></html>
