<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Preferenze</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'><img class='brand-logo' src='assets/branding-hq/walk2eat-navbar-dark-128.png' alt='Walk2Eat logo' /><span class="brand-text">Walk<span class="brand-two">2</span>Eat</span></div><div class='nav-links'><a class='btn secondary' href='dashboard.html'>La tua pausa</a><a class='btn ghost' href='favorites.html'>Preferiti</a></div></div><div class='card'><h2 id='prefsTitle'>Preferenze</h2><div class='form-row'><div><label>Pausa massima (min)</label><select id='breakMinutes'><option>20</option><option>30</option><option>45</option><option>60</option><option>75</option><option>90</option></select></div><div><label>Camminata desiderata (min)</label><select id='walkMinutes'><option>10</option><option>15</option><option>20</option><option>30</option></select></div><div><label>Tipo di cibo</label><div style='display:flex;align-items:center;gap:8px;padding:8px 2px 8px'><input id='schiscettaCheck' type='checkbox' style='width:16px;height:16px' /><span class='small' style='color:inherit'>Ho già la schiscetta</span></div><select id='cuisine'><option>Scegli tu</option></select></div><div><label>Budget</label><select id='budget'><option>$</option><option>$$</option><option>$$$</option></select></div><div><label>Preferenze alimentari</label><select id='diet'><option value='none'>Nessuna</option><option>Vegetariano</option><option>Vegano</option><option>Gluten free</option><option>Intolleranza al lattosio</option></select></div><div><label>Intensità</label><select id='intensity'><option>rilassata</option><option>media</option><option>dinamica</option></select></div><div><label>Obiettivo pausa</label><select id='goal'><option>staccare</option><option>muoversi</option><option>scoprire posti nuovi</option><option>mangiare veloce</option></select></div><div><label>Indirizzo di partenza (opzionale)</label><div style='display:flex;align-items:center;gap:8px;padding:8px 2px 8px'><input id='gpsCheck' type='checkbox' style='width:16px;height:16px' /><span class='small' style='color:inherit'>Usa posizione attuale (GPS)</span></div><input id='address' class='input' placeholder='Es. Via Nassa 1, Lugano'></div></div><div style='margin-top:12px;display:flex;gap:8px;flex-wrap:wrap'><button id='save' class='btn'>Salva preferenze</button><button id='logoutBtn' class='btn ghost' type='button'>Logout</button></div></div></div><script src='assets/js/app.js'></script><script>const user=LBW.getUser();const prefsTitleEl=document.getElementById('prefsTitle');prefsTitleEl.textContent=`Preferenze ${user?.name||'utente'}`;const breakMinutesEl=document.getElementById('breakMinutes'),walkMinutesEl=document.getElementById('walkMinutes'),budgetEl=document.getElementById('budget'),cuisineEl=document.getElementById('cuisine'),dietEl=document.getElementById('diet'),intensityEl=document.getElementById('intensity'),goalEl=document.getElementById('goal'),schiscettaCheckEl=document.getElementById('schiscettaCheck'),addressEl=document.getElementById('address'),gpsCheckEl=document.getElementById('gpsCheck'),saveEl=document.getElementById('save'),logoutBtn=document.getElementById('logoutBtn');LBW.DB.cuisines.forEach(c=>cuisineEl.innerHTML+=`<option>${c}</option>`);function syncFoodBudgetDisabled(){const off=schiscettaCheckEl.checked;cuisineEl.disabled=off;budgetEl.disabled=off;dietEl.disabled=off;cuisineEl.style.opacity=off?'0.6':'1';budgetEl.style.opacity=off?'0.6':'1';dietEl.style.opacity=off?'0.6':'1';cuisineEl.style.cursor=off?'not-allowed':'pointer';budgetEl.style.cursor=off?'not-allowed':'pointer';dietEl.style.cursor=off?'not-allowed':'pointer';}const p=LBW.getPrefs();breakMinutesEl.value=p.breakMinutes;walkMinutesEl.value=p.walkMinutes;budgetEl.value=p.budget;cuisineEl.value=p.cuisine||'Scegli tu';dietEl.value=p.diet;intensityEl.value=p.intensity;goalEl.value=p.goal;schiscettaCheckEl.checked=(p.mealMode==='Ho già la schiscetta');addressEl.value=(p.location?.label && p.location.label!=='Posizione attuale')?p.location.label:'';addressEl.placeholder='Es. Via Nassa 1, Lugano';let currentPos={lat:p.location.lat,lng:p.location.lng};gpsCheckEl.checked=(p.location?.label==='Posizione attuale');function syncAddressMode(){if(gpsCheckEl.checked){addressEl.value='Posizione attuale';addressEl.disabled=true;addressEl.style.opacity='0.7';addressEl.style.cursor='not-allowed';}else{if(addressEl.value==='Posizione attuale')addressEl.value='';addressEl.disabled=false;addressEl.style.opacity='1';addressEl.style.cursor='text';addressEl.placeholder='Es. Via Nassa 1, Lugano';}}syncAddressMode();syncFoodBudgetDisabled();schiscettaCheckEl.onchange=()=>{syncFoodBudgetDisabled();};gpsCheckEl.onchange=()=>{if(!gpsCheckEl.checked){syncAddressMode();return;} if(!navigator.geolocation){alert('GPS non supportato dal browser');gpsCheckEl.checked=false;syncAddressMode();return;}navigator.geolocation.getCurrentPosition((pos)=>{currentPos={lat:pos.coords.latitude,lng:pos.coords.longitude};syncAddressMode();alert('Posizione aggiornata');},()=>{alert('Impossibile ottenere la posizione GPS');gpsCheckEl.checked=false;syncAddressMode();},{enableHighAccuracy:true,timeout:8000});};logoutBtn.onclick=()=>{LBW.Store.set('lbw_user', null);window.location.href='index.html';};saveEl.onclick=()=>{const mealMode=schiscettaCheckEl.checked?'Ho già la schiscetta':'Mangio fuori';const label=gpsCheckEl.checked?'Posizione attuale':(addressEl.value||'');LBW.setPrefs({breakMinutes:+breakMinutesEl.value,walkMinutes:+walkMinutesEl.value,budget:budgetEl.value,cuisine:cuisineEl.value,diet:dietEl.value,intensity:intensityEl.value,goal:goalEl.value,mood:p.mood||'Oggi zero sbatti',mealMode,location:{label,lat:currentPos.lat,lng:currentPos.lng}});LBW.buildProposal();alert('Preferenze aggiornate');location.href='dashboard.html';};</script></body></html>
