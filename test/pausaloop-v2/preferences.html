<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Preferenze</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'>Walk2Eat</div><div class='nav-links'><a class='btn secondary' href='dashboard.html'>La tua pausa</a><a class='btn ghost' href='favorites.html'>Preferiti</a></div></div><div class='card'><h2 id='prefsTitle'>Preferenze</h2><div class='form-row'><div><label>Pausa massima (min)</label><select id='breakMinutes'><option>20</option><option>30</option><option>45</option><option>60</option><option>75</option><option>90</option></select></div><div><label>Camminata desiderata (min)</label><select id='walkMinutes'><option>10</option><option>15</option><option>20</option><option>30</option></select></div><div><label>Budget</label><select id='budget'><option>$</option><option>$$</option><option>$$$</option></select></div><div><label>Ho già la schiscetta</label><div class='input' style='display:flex;align-items:center;gap:8px'><input id='schiscettaCheck' type='checkbox' /><span class='small' style='color:inherit'>Usa spot e disattiva scelta cibo</span></div></div><div><label>Tipo di cibo</label><select id='cuisine'><option>Scegli tu</option></select></div><div><label>Preferenze alimentari</label><select id='diet'><option value='none'>Nessuna</option><option>Vegetariano</option><option>Vegano</option><option>Gluten free</option><option>Intolleranza al lattosio</option></select></div><div><label>Intensità</label><select id='intensity'><option>rilassata</option><option>media</option><option>dinamica</option></select></div><div><label>Obiettivo pausa</label><select id='goal'><option>staccare</option><option>muoversi</option><option>scoprire posti nuovi</option><option>mangiare veloce</option></select></div><div><label>Modalità pranzo</label><select id='mealMode'></select></div><div><label>Indirizzo ufficio (opzionale)</label><input id='address' class='input' placeholder='Es. Via Nassa 1, Lugano'></div><div><label>&nbsp;</label><button id='gpsBtn' class='btn secondary' type='button'>Usa posizione attuale (GPS)</button></div></div><div style='margin-top:12px'><button id='save' class='btn'>Salva preferenze</button></div></div></div><script src='assets/js/app.js'></script><script>const user=LBW.getUser();const prefsTitleEl=document.getElementById('prefsTitle');prefsTitleEl.textContent=`Preferenze ${user?.name||'utente'}`;const breakMinutesEl=document.getElementById('breakMinutes'),walkMinutesEl=document.getElementById('walkMinutes'),budgetEl=document.getElementById('budget'),cuisineEl=document.getElementById('cuisine'),dietEl=document.getElementById('diet'),intensityEl=document.getElementById('intensity'),goalEl=document.getElementById('goal'),mealModeEl=document.getElementById('mealMode'),schiscettaCheckEl=document.getElementById('schiscettaCheck'),addressEl=document.getElementById('address'),gpsBtn=document.getElementById('gpsBtn'),saveEl=document.getElementById('save');LBW.DB.cuisines.forEach(c=>cuisineEl.innerHTML+=`<option>${c}</option>`);LBW.DB.mealModes.forEach(m=>mealModeEl.innerHTML+=`<option>${m}</option>`);function syncCuisineDisabled(){cuisineEl.disabled=schiscettaCheckEl.checked;cuisineEl.style.opacity=schiscettaCheckEl.checked?'0.6':'1';cuisineEl.style.cursor=schiscettaCheckEl.checked?'not-allowed':'pointer';}const p=LBW.getPrefs();breakMinutesEl.value=p.breakMinutes;walkMinutesEl.value=p.walkMinutes;budgetEl.value=p.budget;cuisineEl.value=p.cuisine||'Scegli tu';dietEl.value=p.diet;intensityEl.value=p.intensity;goalEl.value=p.goal;mealModeEl.value=p.mealMode||'Mangio fuori';schiscettaCheckEl.checked=(p.mealMode==='Ho già la schiscetta');addressEl.value=p.location.label||'';let currentPos={lat:p.location.lat,lng:p.location.lng};syncCuisineDisabled();schiscettaCheckEl.onchange=()=>{if(schiscettaCheckEl.checked){mealModeEl.value='Ho già la schiscetta';}else if(mealModeEl.value==='Ho già la schiscetta'){mealModeEl.value='Mangio fuori';}syncCuisineDisabled();};gpsBtn.onclick=()=>{if(!navigator.geolocation){alert('GPS non supportato dal browser');return;}gpsBtn.disabled=true;gpsBtn.textContent='Rilevo posizione...';navigator.geolocation.getCurrentPosition((pos)=>{currentPos={lat:pos.coords.latitude,lng:pos.coords.longitude};if(!addressEl.value)addressEl.value='Posizione attuale';gpsBtn.disabled=false;gpsBtn.textContent='Usa posizione attuale (GPS)';alert('Posizione aggiornata');},()=>{alert('Impossibile ottenere la posizione GPS');gpsBtn.disabled=false;gpsBtn.textContent='Usa posizione attuale (GPS)';},{enableHighAccuracy:true,timeout:8000});};saveEl.onclick=()=>{const mealMode=schiscettaCheckEl.checked?'Ho già la schiscetta':mealModeEl.value;LBW.setPrefs({breakMinutes:+breakMinutesEl.value,walkMinutes:+walkMinutesEl.value,budget:budgetEl.value,cuisine:cuisineEl.value,diet:dietEl.value,intensity:intensityEl.value,goal:goalEl.value,mood:p.mood||'Oggi zero sbatti',mealMode,location:{label:addressEl.value||'Posizione attuale',lat:currentPos.lat,lng:currentPos.lng}});LBW.buildProposal();alert('Preferenze aggiornate');location.href='dashboard.html';};</script></body></html>
