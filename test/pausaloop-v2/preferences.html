<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Preferenze</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'>PausaLoop</div><div class='nav-links'><a class='btn secondary' href='dashboard.html'>Dashboard</a></div></div><div class='card'><h2>Preferenze utente</h2><div class='form-row'><div><label>Pausa massima (min)</label><select id='breakMinutes'><option>20</option><option>30</option><option>45</option><option>60</option></select></div><div><label>Camminata desiderata (min)</label><select id='walkMinutes'><option>10</option><option>15</option><option>20</option><option>30</option></select></div><div><label>Budget</label><select id='budget'><option>$</option><option>$$</option><option>$$$</option></select></div><div><label>Tipo cibo</label><select id='cuisine'></select></div><div><label>Preferenze alimentari</label><select id='diet'><option value='none'>Nessuna</option><option>Vegetariano</option><option>Vegano</option><option>Gluten free</option></select></div><div><label>Intensità</label><select id='intensity'><option>rilassata</option><option>media</option><option>dinamica</option></select></div><div><label>Obiettivo pausa</label><select id='goal'><option>staccare</option><option>muoversi</option><option>scoprire posti nuovi</option><option>mangiare veloce</option></select></div><div><label>Modalità pranzo</label><select id='mealMode'></select></div><div><label>Modalità rapida</label><select id='mood'></select></div><div><label>Zona ufficio (nome)</label><input id='label' class='input' placeholder='Lugano Centro'></div><div><label>Lat,Lng (opzionale)</label><input id='coords' class='input' placeholder='46.0037,8.9511'></div></div><div style='margin-top:12px'><button id='save' class='btn'>Salva preferenze</button></div></div></div><script src='assets/js/app.js'></script><script>const breakMinutesEl=document.getElementById('breakMinutes'),walkMinutesEl=document.getElementById('walkMinutes'),budgetEl=document.getElementById('budget'),cuisineEl=document.getElementById('cuisine'),dietEl=document.getElementById('diet'),intensityEl=document.getElementById('intensity'),goalEl=document.getElementById('goal'),mealModeEl=document.getElementById('mealMode'),moodEl=document.getElementById('mood'),labelEl=document.getElementById('label'),coordsEl=document.getElementById('coords'),saveEl=document.getElementById('save');LBW.DB.cuisines.forEach(c=>cuisineEl.innerHTML+=`<option>${c}</option>`);LBW.DB.moods.forEach(m=>moodEl.innerHTML+=`<option>${m}</option>`);LBW.DB.mealModes.forEach(m=>mealModeEl.innerHTML+=`<option>${m}</option>`);const p=LBW.getPrefs();breakMinutesEl.value=p.breakMinutes;walkMinutesEl.value=p.walkMinutes;budgetEl.value=p.budget;cuisineEl.value=p.cuisine;dietEl.value=p.diet;intensityEl.value=p.intensity;goalEl.value=p.goal;moodEl.value=p.mood;mealModeEl.value=p.mealMode||'Mangio fuori';labelEl.value=p.location.label;coordsEl.value=`${p.location.lat},${p.location.lng}`;saveEl.onclick=()=>{const [lat,lng]=(coordsEl.value||'').split(',').map(Number);LBW.setPrefs({breakMinutes:+breakMinutesEl.value,walkMinutes:+walkMinutesEl.value,budget:budgetEl.value,cuisine:cuisineEl.value,diet:dietEl.value,intensity:intensityEl.value,goal:goalEl.value,mood:moodEl.value,mealMode:mealModeEl.value,location:{label:labelEl.value||'Ufficio',lat:isFinite(lat)?lat:46.0037,lng:isFinite(lng)?lng:8.9511}});LBW.buildProposal();alert('Preferenze aggiornate');location.href='dashboard.html';};</script></body></html>
