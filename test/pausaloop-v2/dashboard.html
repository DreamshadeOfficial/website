<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>La tua pausa</title><link rel='stylesheet' href='assets/css/styles.css'><link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'><script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script></head><body><div class='container'><div class='nav'><div class='brand'>PausaLoop</div><div class='nav-links'><a class='btn ghost' href='preferences.html'>Preferenze</a><a class='btn ghost' href='history.html'>Cronologia</a><a class='btn ghost' href='favorites.html'>Preferiti</a></div></div><h2 id='hello'></h2><div class='grid cols-2'><div class='card'><span class='badge'>Camminata</span><h3 id='walk'></h3><p id='walk2' class='small'></p></div><div class='card'><span class='badge'>Food</span><h3 id='food'></h3><p id='food2' class='small'></p><div id='foodActions' style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'></div></div></div><div class='card' style='margin-top:12px'><div style='display:flex;justify-content:space-between;gap:8px;align-items:center'><span class='badge'>Anteprima percorso</span><span id='updatedAt' class='small'></span></div><div id='mapPreview' class='map-box' style='margin-top:8px;height:240px'></div></div><div style='display:flex;gap:10px;flex-wrap:wrap;margin-top:12px'><a class='btn' href='map.html'>Segui il percorso</a><button id='refresh' class='btn secondary'>Proponi alternativa</button><button id='detailToggle' class='btn ghost'>Mostra dettagli</button><button id='save' class='btn ghost'>♡ Preferiti</button></div><div id='detailPanel' style='display:none'><div class='grid cols-2' style='margin-top:12px'><div class='card'><h3>Tempi</h3><div id='timeBreakdown' class='small'></div></div><div class='card'><h3>Meteo</h3><div id='weatherBox' class='small'></div></div></div><div class='card' style='margin-top:12px'><h3>Perché questa proposta</h3><div id='whyBox' class='small'></div></div><div class='card' style='margin-top:12px'><h3>Confronto alternative</h3><div id='compareBox' class='list'></div></div></div></div><script src='assets/js/app.js'></script><script>const HEART_OFF='\u2661',HEART_ON='\u2764';const u=LBW.getUser();if(!u)location.href='login.html';const prefs=LBW.getPrefs();const helloEl=document.getElementById('hello'),walkEl=document.getElementById('walk'),walk2El=document.getElementById('walk2'),foodEl=document.getElementById('food'),food2El=document.getElementById('food2'),foodActionsEl=document.getElementById('foodActions'),updatedAtEl=document.getElementById('updatedAt'),refreshEl=document.getElementById('refresh'),saveEl=document.getElementById('save'),detailToggleEl=document.getElementById('detailToggle'),detailPanelEl=document.getElementById('detailPanel'),timeBreakdownEl=document.getElementById('timeBreakdown'),whyBoxEl=document.getElementById('whyBox'),compareBoxEl=document.getElementById('compareBox'),weatherBoxEl=document.getElementById('weatherBox');helloEl.textContent=`Ciao ${u.name}, ecco la tua pausa ideale`;let map,routeLine,startMarker,destMarker;let altCycleIndex=0;function initMap(){if(map)return;map=L.map('mapPreview',{zoomControl:false,attributionControl:false});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);}function setFavButton(proposal){const placeFav=LBW.isFavoritePlace(proposal.food);const routeFav=LBW.isFavoriteRoute(proposal);if(placeFav&&routeFav){saveEl.textContent=`${HEART_ON} Preferiti`;saveEl.classList.add('secondary');}else{saveEl.textContent=`${HEART_OFF} Preferiti`;saveEl.classList.remove('secondary');}}function weatherMock(){const d=new Date();const key=(d.getDate()+d.getMonth()+d.getHours())%4;if(key===0)return{label:'Sole',temp:22,bad:false};if(key===1)return{label:'Nuvoloso',temp:18,bad:false};if(key===2)return{label:'Pioggia leggera',temp:14,bad:true};return{label:'Vento forte',temp:12,bad:true};}function renderBreakdown(p){const walkTotal=p.walk.minutes;const walkOut=Math.max(6,Math.floor(walkTotal*0.55));const walkBack=Math.max(4,walkTotal-walkOut);const orderMin=p.food.mealMode==='Ho già la schiscetta'?3:8;const lunchMin=Math.max(10,p.food.etaEatMin);const total=walkOut+orderMin+lunchMin+walkBack;timeBreakdownEl.innerHTML=`<div>Cammino andata: <b>${walkOut} min</b></div><div>Ordine/ritiro: <b>${orderMin} min</b></div><div>Pranzo: <b>${lunchMin} min</b></div><div>Rientro: <b>${walkBack} min</b></div><hr style='border-color:#334155'><div>Totale stimato: <b>${total} min</b></div>`;}function renderWhy(p){const reasons=[];reasons.push(`Scelta in base al tuo obiettivo: <b>${prefs.goal}</b>.`);reasons.push(`Intensità camminata: <b>${prefs.intensity}</b>.`);if(prefs.mealMode==='Ho già la schiscetta'){reasons.push('Hai indicato che hai già la schiscetta: proposta orientata a uno spot tranquillo.');}else{reasons.push(`Coerente con preferenze cibo/budget: <b>${prefs.cuisine}</b>, <b>${prefs.budget}</b>.`);}reasons.push(`Distanza contenuta (${typeof p.food.distance==='number'?p.food.distance.toFixed(2):'-'} km) per ridurre stress e tempi.`);whyBoxEl.innerHTML='<ul>'+reasons.map(r=>`<li>${r}</li>`).join('')+'</ul>';}function applyAlternative(idx){const p=LBW.getProposal();const chosen=p.alternatives[idx];if(!chosen)return;const oldMain=p.food;p.food=chosen;p.alternatives=p.alternatives.filter((_,i)=>i!==idx);p.alternatives.unshift(oldMain);if(p.route&&p.route.length>=3){p.route[2]={lat:chosen.lat,lng:chosen.lng};}p.createdAt=new Date().toISOString();LBW.Store.set('lbw_today',p);render();}function compareAlt(p){if(!p.alternatives||!p.alternatives.length){compareBoxEl.innerHTML='<div class="small">Nessuna alternativa disponibile.</div>';return;}compareBoxEl.innerHTML=p.alternatives.map((a,i)=>{const pro=[];const con=[];if(a.distance<p.food.distance)pro.push('più vicino');else con.push('leggermente più distante');/* rating hidden */if(a.price===p.food.price)pro.push('stessa fascia prezzo');else con.push('fascia prezzo diversa');return `<div class='card'><b>${a.name}</b><div class='small'>${a.cuisine} • ${a.price} • ${a.distance.toFixed(2)} km</div><div class='small'><b>Pro:</b> ${pro.join(', ')||'—'}</div><div class='small'><b>Contro:</b> ${con.join(', ')||'—'}</div><button class='btn ghost' style='margin-top:8px' data-alt='${i}'>Selezione alternativa</button></div>`;}).join('');setTimeout(()=>{compareBoxEl.querySelectorAll('button[data-alt]').forEach(b=>{b.onclick=()=>applyAlternative(Number(b.getAttribute('data-alt')));});},0);}function renderWeather(){const w=weatherMock();const icon=w.label.includes('Sole')?'☀️':w.label.includes('Nuvoloso')?'☁️':w.label.includes('Pioggia')?'🌧️':'💨';weatherBoxEl.innerHTML=`<div style='display:flex;align-items:center;gap:10px'><span style='font-size:1.4rem'>${icon}</span><span><b>${w.label}</b>, ${w.temp}°C ${w.bad?'• condizioni sfavorevoli':'• condizioni buone'}</span></div>`;}function render(){const p=LBW.getProposal();walkEl.textContent=`${p.walk.minutes} min • ${p.walk.distanceKm} km`;walk2El.textContent=p.walk.type;const d=(typeof p.food.distance==='number')?` • a ${p.food.distance.toFixed(2)} km`:'';foodEl.textContent=`${p.food.name} (${p.food.cuisine})`;food2El.textContent=`${p.food.price}${d} • ${p.food.mealMode||'Mangio fuori'}`;updatedAtEl.textContent=`Aggiornato: ${new Date(p.createdAt).toLocaleTimeString()}`;foodActionsEl.innerHTML='';if(p.food.reserveUrl){foodActionsEl.innerHTML+=`<a class='btn ghost' href='${p.food.reserveUrl}' target='_blank' rel='noopener'>Riserva</a>`;}if(p.food.preorderUrl){foodActionsEl.innerHTML+=`<a class='btn ghost' href='${p.food.preorderUrl}' target='_blank' rel='noopener'>Pre-ordina</a>`;}setFavButton(p);renderBreakdown(p);renderWhy(p);compareAlt(p);renderWeather();initMap();const pts=(p.route||[]).map(x=>[x.lat,x.lng]);if(routeLine)map.removeLayer(routeLine);if(startMarker)map.removeLayer(startMarker);if(destMarker)map.removeLayer(destMarker);if(pts.length){routeLine=L.polyline(pts,{color:'#22c55e',weight:4}).addTo(map);startMarker=L.marker(pts[0]).addTo(map).bindPopup('Partenza');destMarker=L.marker(pts[2]||pts[pts.length-1]).addTo(map).bindPopup(p.food.name);map.fitBounds(L.latLngBounds(pts),{padding:[20,20]});}}render();refreshEl.onclick=()=>{const p=LBW.getProposal();if(!p.alternatives||!p.alternatives.length){LBW.buildProposal();altCycleIndex=0;render();return;}const idx=altCycleIndex % p.alternatives.length;applyAlternative(idx);altCycleIndex++;};saveEl.onclick=()=>{const p=LBW.getProposal();LBW.toggleFavoritePlace(p.food);LBW.toggleFavoriteRoute(p);setFavButton(p);};detailToggleEl.onclick=()=>{const isOpen=detailPanelEl.style.display!=='none';detailPanelEl.style.display=isOpen?'none':'block';detailToggleEl.textContent=isOpen?'Mostra dettagli':'Nascondi dettagli';};</script></body></html>
