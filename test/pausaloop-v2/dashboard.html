<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Dashboard</title><link rel='stylesheet' href='assets/css/styles.css'><link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'><script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script></head><body><div class='container'><div class='nav'><div class='brand'>PausaLoop</div><div class='nav-links'><a class='btn ghost' href='preferences.html'>Preferenze</a><a class='btn ghost' href='history.html'>Cronologia</a><a class='btn ghost' href='favorites.html'>Preferiti</a></div></div><h2 id='hello'></h2><p class='small'>Proposta pausa pranzo di oggi</p><div class='grid cols-2'><div class='card'><span class='badge'>Camminata</span><h3 id='walk'></h3><p id='walk2' class='small'></p></div><div class='card'><span class='badge'>Food</span><h3 id='food'></h3><p id='food2' class='small'></p><div id='foodActions' style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'></div></div></div><div class='card' style='margin-top:12px'><div style='display:flex;justify-content:space-between;gap:8px;align-items:center'><span class='badge'>Anteprima percorso</span><span id='updatedAt' class='small'></span></div><div id='mapPreview' class='map-box' style='margin-top:8px;height:240px'></div></div><div style='display:flex;gap:10px;flex-wrap:wrap;margin-top:12px'><a class='btn' href='map.html'>Segui il percorso</a><button id='refresh' class='btn secondary'>Cambia proposta</button><button id='save' class='btn ghost'>☆ Preferito</button><a class='btn ghost' href='proposal.html'>Dettaglio proposta</a></div></div><script src='assets/js/app.js'></script><script>const u=LBW.getUser();if(!u)location.href='login.html';const helloEl=document.getElementById('hello'),walkEl=document.getElementById('walk'),walk2El=document.getElementById('walk2'),foodEl=document.getElementById('food'),food2El=document.getElementById('food2'),foodActionsEl=document.getElementById('foodActions'),updatedAtEl=document.getElementById('updatedAt'),refreshEl=document.getElementById('refresh'),saveEl=document.getElementById('save');helloEl.textContent=`Ciao ${u.name}, ecco la tua pausa ideale`;let map,routeLine,startMarker,destMarker;function initMap(){if(map)return;map=L.map('mapPreview',{zoomControl:false,attributionControl:false});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);}function setFavButton(proposal){const placeFav=LBW.isFavoritePlace(proposal.food);const routeFav=LBW.isFavoriteRoute(proposal);if(placeFav&&routeFav){saveEl.textContent='★ Preferiti';saveEl.classList.add('secondary');}else{saveEl.textContent='☆ Preferiti';saveEl.classList.remove('secondary');}}function render(){const p=LBW.getProposal();walkEl.textContent=`${p.walk.minutes} min • ${p.walk.distanceKm} km`;walk2El.textContent=p.walk.type;const d=(typeof p.food.distance==='number')?` • a ${p.food.distance.toFixed(2)} km`:'';foodEl.textContent=`${p.food.name} (${p.food.cuisine})`;food2El.textContent=`${p.food.price} • ⭐ ${p.food.rating}${d} • ${p.food.mealMode||'Mangio fuori'}`;updatedAtEl.textContent=`Aggiornato: ${new Date(p.createdAt).toLocaleTimeString()}`;foodActionsEl.innerHTML='';if(p.food.reserveUrl){foodActionsEl.innerHTML+=`<a class='btn ghost' href='${p.food.reserveUrl}' target='_blank' rel='noopener'>Riserva</a>`;}if(p.food.preorderUrl){foodActionsEl.innerHTML+=`<a class='btn ghost' href='${p.food.preorderUrl}' target='_blank' rel='noopener'>Pre-ordina</a>`;}setFavButton(p);initMap();const pts=(p.route||[]).map(x=>[x.lat,x.lng]);if(routeLine)map.removeLayer(routeLine);if(startMarker)map.removeLayer(startMarker);if(destMarker)map.removeLayer(destMarker);if(pts.length){routeLine=L.polyline(pts,{color:'#22c55e',weight:4}).addTo(map);startMarker=L.marker(pts[0]).addTo(map).bindPopup('Partenza');destMarker=L.marker(pts[2]||pts[pts.length-1]).addTo(map).bindPopup(p.food.name);map.fitBounds(L.latLngBounds(pts),{padding:[20,20]});}}render();refreshEl.onclick=()=>{LBW.buildProposal();render();};saveEl.onclick=()=>{const p=LBW.getProposal();LBW.toggleFavoritePlace(p.food);LBW.toggleFavoriteRoute(p);setFavButton(p);};</script></body></html>
