<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Ristorante</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'>PausaLoop</div><div class='nav-links'><a class='btn secondary' href='proposal.html'>Proposta</a></div></div><div class='card' id='box'></div></div><script src='assets/js/app.js'></script><script>const id=String(new URLSearchParams(location.search).get('id'));const all=[LBW.getProposal().food,...LBW.getProposal().alternatives];const r=all.find(x=>String(x.id)===id)||LBW.getProposal().food;const actions=[`<button class='btn' id='saveBtn'>Salva nei preferiti</button>`];if(r.reserveUrl)actions.push(`<a class='btn ghost' href='${r.reserveUrl}' target='_blank' rel='noopener'>Riserva</a>`);if(r.preorderUrl)actions.push(`<a class='btn ghost' href='${r.preorderUrl}' target='_blank' rel='noopener'>Pre-ordina</a>`);box.innerHTML=`<h2>${r.name}</h2><p>${r.cuisine} • ${r.price} • ⭐ ${r.rating}</p><p class='small'>Distanza: ${r.distance?.toFixed(2) ?? '-'} km</p><div style='display:flex;gap:8px;flex-wrap:wrap'>${actions.join('')}</div>`;document.getElementById('saveBtn').onclick=()=>{LBW.saveFavoritePlace(r);alert('Posto salvato');};</script></body></html>
