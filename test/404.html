<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dreamshade — Torniamo presto</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #f5f5f5;
        background: radial-gradient(circle at 20% 0, #101424, #05060a 60%);
      }

      .hero {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        text-align: center;
        padding: 2rem;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: url("assets/img/hero-main.jpg") center center / cover no-repeat;
        filter: grayscale(0.25) contrast(1.1) brightness(0.75);
        transform: scale(1.08);
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 10% 0, rgba(58, 230, 255, 0.22), transparent 45%),
          linear-gradient(to bottom right, rgba(5, 6, 10, 0.45), rgba(5, 6, 10, 0.95));
      }

      .panel {
        position: relative;
        z-index: 1;
        max-width: 860px;
        border: 1px solid rgba(58, 230, 255, 0.35);
        border-radius: 18px;
        background: rgba(5, 6, 10, 0.55);
        backdrop-filter: blur(6px);
        padding: clamp(1.5rem, 3vw, 2.5rem);
        box-shadow: 0 20px 60px rgba(0,0,0,.55);
      }

      .status {
        color: #3ae6ff;
        text-transform: uppercase;
        letter-spacing: .22em;
        font-size: .78rem;
        margin-bottom: .9rem;
      }

      h1 {
        text-transform: uppercase;
        letter-spacing: .16em;
        line-height: 1.25;
        font-size: clamp(1.4rem, 4vw, 2.8rem);
      }

      p {
        margin-top: 1rem;
        color: #cfd4ea;
        font-size: clamp(.95rem, 1.8vw, 1.1rem);
      }

      .cta-group {
        margin-top: 1.6rem;
        display: inline-flex;
        flex-wrap: wrap;
        gap: .8rem;
        justify-content: center;
      }

      .home-link,
      .social-link {
        display: inline-flex;
        align-items: center;
        gap: .35rem;
        padding: .7rem 1.3rem;
        border-radius: 999px;
        border: 1px solid #3ae6ff;
        color: #3ae6ff;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: .12em;
        font-size: .78rem;
        transition: background .2s ease, color .2s ease, border-color .2s ease;
      }

      .home-link:hover,
      .social-link:hover {
        background: rgba(58,230,255,.12);
      }

      .social-link {
        border-color: rgba(249, 90, 152, 0.8);
        color: rgba(249, 90, 152, 0.95);
      }

      .social-link:hover {
        background: rgba(249, 90, 152, 0.14);
      }
    </style>
  </head>
  <body>
    <section class="hero" role="img" aria-label="Dreamshade in manutenzione">
      <div class="panel">
        <div class="status">Dreamshade Official</div>
        <h1>Site under maintenance<br />We’ll be back soon</h1>
        <p>We’re making technical updates. Thanks for your patience.</p>
        <p style="margin-top:1.2rem;font-weight:600;color:#f9fafc;letter-spacing:.08em;">CIAONE dal quartier generale Dreamshade 🤘</p>
        <div class="cta-group">
          <a class="home-link" href="/">Back to home</a>
          <a
            class="social-link"
            href="https://www.instagram.com/dreamshadeband/"
            target="_blank"
            rel="noopener"
            data-app-link="instagram://user?username=dreamshadeband"
          >
            Instagram @dreamshadeband
          </a>
        </div>
      </div>
    </section>
    <script>
      (function () {
        const link = document.querySelector('.social-link');
        if (!link) return;
        const appLink = link.dataset.appLink;
        if (!appLink) return;
        link.addEventListener('click', function (event) {
          const isMobile = /(Android|iPhone|iPad|iPod)/i.test(navigator.userAgent || '');
          if (!isMobile) return;
          event.preventDefault();
          let didHide = false;
          const visibilityHandler = () => {
            if (document.hidden) {
              didHide = true;
              document.removeEventListener('visibilitychange', visibilityHandler);
            }
          };
          document.addEventListener('visibilitychange', visibilityHandler);
          const cleanup = () => {
            document.removeEventListener('visibilitychange', visibilityHandler);
          };
          const fallbackTimer = setTimeout(() => {
            if (!didHide) {
              window.open(link.href, '_blank', 'noopener');
            }
            cleanup();
          }, 1200);
          window.location.href = appLink;
          setTimeout(() => {
            clearTimeout(fallbackTimer);
            cleanup();
          }, 2500);
        });
      })();
    </script>
  </body>
</html>
